version: '3.8'
services:
  db:
    image: postgres:15-alpine
    container_name: postgres_db
    restart: always
    environment:
      - POSTGRES_DB=cyber_db
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admindb
    ports:
      - "5432:5432"

  # Opcjonalnie: Adminer do podglądu bazy przez przeglądarkę
  adminer:
    image: adminer
    restart: always
    ports:
      - "8081:8080"